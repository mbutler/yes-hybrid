; Variant "theyeshybrid" v2-flag.  The Treasure ceases to be a piece; the
; Leader reaching g8 wins.  The Horde starts with a Minion guarding g8 so
; any approach must fight through at least one defender.  See README and
; rulesets/flag-only.json for the design rationale.

[theyeshybrid:chess]

maxRank   = 8
maxFile   = 12

; ---- No royal piece on the Horde side.  Game terminates via either:
;      * flag      : White's flagPiece (Leader) reaches the flag region.
;      * extinction: A side has 0 pieces of any type they possessed at start.
; FSF's `flagPiece = l` combined with `extinctionPieceTypes = *` gives us:
;   - Party wins        : Leader on g8.
;   - Party loses       : Party extinct.  (Loss of the Leader makes victory
;                         unreachable; FSF correctly marks that terminal.)
;   - Horde wins        : Party extinct.
;   - Horde loses       : flag reached.
flagPiece        = l
flagPieceCount   = 1
flagRegionWhite  = g8

extinctionValue      = loss
extinctionPieceTypes = *
extinctionPieceCount = 0

; ---- Pieces (identical to v1 except no Treasure, and Minions gain capture
;      in the ruleset overrides where that change is intended) -----------
customPiece1  = d:WcK
customPiece2  = s:mK2cF
customPiece3  = c:gQ
customPiece4  = l:WfF
customPiece5  = x:KAD
customPiece6  = b:mDcK
customPiece7  = a:mR3cK
customPiece8  = u:N
customPiece9  = m:W

; Bloodied variants (used only when a rule set enables Bloodied mode).
customPiece11 = e:W
customPiece12 = y:mKcF
customPiece13 = v:gR
customPiece14 = o:W
customPiece15 = q:K

; ---- Starting position (Minion at g8 replaces Treasure) ----------------
startFen = 4abmba3/2mubmbumm2/12/3*4*3/4**6/12/12/3XCLSD4 w - - 0 1

; ---- Disable chess-derived baggage -------------------------------------
castling          = false
doubleStep        = false
enPassantRegion   = -
promotionRegionWhite = -
promotionRegionBlack = -
promotionPieceTypes  = -
nMoveRule         = 0
nFoldRule         = 0
