; ============================================================================
;  THE YES HYBRID  -  Fairy-Stockfish variant definition
; ============================================================================
;  Reference: see ../# PROJECT SPEC: THE YES HYBRID.md
;
;  This file is loaded via the UCI option:
;      setoption name VariantPath value variants/yeshybrid.ini
;      setoption name UCI_Variant value theyeshybrid
;
;  Section 6 (Multi-Capture / Multi-Move / Forced Movement) is intentionally
;  DEFERRED for v1 per the agreed scope.  Hooks for those mechanics are noted
;  in comments below so they can be turned on later without restructuring.
;
;  ASYMMETRIC VICTORY - how it's wired:
;    * Party (White) loses by EXTINCTION - total piece count reaches 0.
;      (Configured via  extinctionPieceTypes = *  , same mechanism as the
;      built-in `horde` variant where White's horde has no royal piece.)
;    * Horde (Black) loses by CHECKMATE of the Treasure - the Treasure is
;      declared as Black's royal piece via  king = t:mW  .
;
;  Strategically this is identical to the spec's "capture the Treasure" goal:
;  the Party wins when the Treasure can no longer escape attack, which is
;  functionally the same as capturing it.
; ----------------------------------------------------------------------------

[theyeshybrid:chess]

; ---- Board geometry --------------------------------------------------------
maxRank   = 8
maxFile   = 12

; ---- Royal piece: Treasure acts as Black's "king" --------------------------
; Only Black has a Treasure at the start; Fairy-Stockfish handles the
; one-sided royalty natively (same way it handles the Horde variant).
king = t:mW

; ---- Non-royal custom pieces ----------------------------------------------
; Spec Betza            Translated Betza          Notes
; --------------------- ------------------------- ----------------------------
; Defender   D  WcK     WcK                       OK as-is
; Striker    S  (mK2)cF mK2cF                     parens dropped (not Betza syntax)
; Controller C  gQ      gQ                        OK (g = grasshopper modifier)
; Leader     L  WfF     WfF                       OK as-is
; Skirmisher X  K2      KAD                       K2 is a slider; spec says hit-and-run,
;                                                 so use leapers covering the
;                                                 Chebyshev-radius-2 ring (W+F+A+D)
; Brute      B  W2mK    mDcK                      "leaps 2" = Dabbabah jump;
;                                                 "attacks adjacent" = capture-K
; Artillery  A  R3cK    mR3cK                     slide up to 3, capture adjacent
; Lurker     U  p[N]    N                         brackets aren't Betza; pN (hopping
;                                                 knight) is rejected by FS, so the
;                                                 closest legal v1 is a plain Knight.
;                                                 TODO: real "hop over piece" via
;                                                 a custom mover in a later pass.
; Minion     M  W1      W                         W is implicitly range 1
; Treasure   T  W1(m)   mW                        move-only Wazir (defined via  king=t:mW  above)
;
; NOTE: We use 'u' (not 'k') for Lurker because 'k' is historically the king
; letter in Fairy-Stockfish and the reassigned royal letter here is 't'.

customPiece1  = d:WcK
customPiece2  = s:mK2cF
customPiece3  = c:gQ
customPiece4  = l:WfF
customPiece5  = x:KAD
customPiece6  = b:mDcK
customPiece7  = a:mR3cK
customPiece8  = u:N
customPiece9  = m:W
; (customPiece10 for Treasure is intentionally absent - handled by  king = t:mW  )

; ---- Bloodied (Section 6.1 Multi-Capture) --------------------------------
; Party pieces take two hits to remove.  On the first capture attempt, the
; CLI post-processes the resulting FEN so the attacker is restored to its
; origin square and a Bloodied version of the defender sits on the target
; square.  The engine then continues playing naturally - it sees these as
; ordinary pieces that happen to have weaker stats.
;
;   Fresh        -> Bloodied        Stat reduction
;   D  WcK       -> E  W            loses capture-any ring
;   S  mK2cF     -> Y  mKcF         range 2 collapses to range 1
;   C  gQ        -> V  gR           grasshopper only along rook lines
;   L  WfF       -> O  W            loses forward-diagonal
;   X  KAD       -> Q  K            leaper ring collapses to adjacency
customPiece11 = e:W
customPiece12 = y:mKcF
customPiece13 = v:gR
customPiece14 = o:W
customPiece15 = q:K

; ---- Starting position ----------------------------------------------------
; 12 files (a-l), 8 ranks.  Side A (Party = White) at the bottom.
; '*' marks an impassable static square (used for both holeSquares
; "pillars/pits" AND wall barriers, since Fairy-Stockfish treats them
; identically as obstacles in the FEN).
;
;   rank 8  . . . . a b t b a . . .     (Horde back: Treasure flanked by Brutes/Artillery)
;   rank 7  . . m u b m b u m m . .     (Horde middle: minions, lurkers, brutes)
;   rank 6  . . . . . . . . . . . .     (empty)
;   rank 5  . . . # . . . . # . . .     (two pillar holes)
;   rank 4  . . . . # # . . . . . .     (a short wall fragment)
;   rank 3  . . . . . . . . . . . .     (empty)
;   rank 2  . . . . . . . . . . . .     (empty)
;   rank 1  . . . X C L S D . . . .     (Party: Skirmisher, Controller, Leader, Striker, Defender)

startFen = 4abtba3/2mubmbumm2/12/3*4*3/4**6/12/12/3XCLSD4 w - - 0 1

; ---- Asymmetric victory ---------------------------------------------------
; Party (White) loses when their TOTAL piece count reaches 0 (all five gone).
; Horde (Black) loses when the Treasure (royal) is checkmated.
extinctionValue       = loss
extinctionPieceTypes  = *
extinctionPieceCount  = 0

; ---- Disable chess-derived baggage ----------------------------------------
castling          = false
doubleStep        = false
enPassantRegion   = -
promotionRegionWhite = -
promotionRegionBlack = -
promotionPieceTypes  = -
nMoveRule         = 0
nFoldRule         = 0

; ---- Hooks for Section 6 (DEFERRED for v1) --------------------------------
; Multi-Capture (Bloodied promotion):
;     promotedPieceType = d:db s:sb c:cb l:lb x:xb
; Multi-Move ("Round" of combat):
;     No native Fairy-Stockfish mechanism; simulate CLI-side via repeated UCI calls.
; Forced Movement (push/slide on capture):
;     Requires gating + custom event hooks; not expressible in variants.ini alone.
