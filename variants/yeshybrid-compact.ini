; Variant "theyeshybrid" v3-compact.  Smaller 10x7 board.
; Same piece roster, same asymmetric victory, same Treasure-as-royal,
; but every row is shrunk so Party cannot be ignored for as long.
; Purpose: test whether board sprawl is the reason v2 games stalled,
; independent of any flag-zone experiment.

[theyeshybrid:chess]

maxRank = 7
maxFile = 10

king = t:mW

; Same piece roster as the main variant.  Minion is `W` here;
; rule sets override it to `WcF` or `WfcF` as needed.
customPiece1  = d:WcK
customPiece2  = s:mK2cF
customPiece3  = c:gQ
customPiece4  = l:WfF
customPiece5  = x:KAD
customPiece6  = b:mDcK
customPiece7  = a:mR3cK
customPiece8  = u:N
customPiece9  = m:W

; Bloodied mirror set (used only when a rule set enables Bloodied mode).
customPiece11 = e:W
customPiece12 = y:mKcF
customPiece13 = v:gR
customPiece14 = o:W
customPiece15 = q:K

; ---- Starting position (10 files x 7 ranks) -----------------------------
; Party (White) on rank 1, back layer of Horde (Black) on rank 7.
; The Horde middle row lives on rank 6 instead of rank 7 (fewer empty ranks).
; Two pillar holes on rank 4 create a narrow channel.
;
;   rank 7   . . a b t b a . . .     back:   Artillery/Brute/Treasure/Brute/Artillery
;   rank 6   . m u b m b u m m .     middle: minions + lurkers + brutes
;   rank 5   . . . . . . . . . .
;   rank 4   . . . # . . # . . .     two pillars
;   rank 3   . . . . . . . . . .
;   rank 2   . . . . . . . . . .
;   rank 1   . . . X C L S D . .     Party line
;
startFen = 2abtba3/1mubmbumm1/10/3*2*3/10/10/3XCLSD2 w - - 0 1

extinctionValue      = loss
extinctionPieceTypes = *
extinctionPieceCount = 0

castling          = false
doubleStep        = false
enPassantRegion   = -
promotionRegionWhite = -
promotionRegionBlack = -
promotionPieceTypes  = -
nMoveRule         = 0
nFoldRule         = 0
