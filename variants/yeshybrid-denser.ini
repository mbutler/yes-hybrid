; Variant "theyeshybrid" v3-denser-horde.  Same 12x8 board and Treasure-
; as-royal as the main variant, but the Horde middle row is denser:
; two extra Minions flanking the existing block on rank 7.  This tests
; whether the Horde is currently under-armed *even with* the minion-caps
; buff.  Expect more Horde wins and/or slower Party invasion.

[theyeshybrid:chess]

maxRank = 8
maxFile = 12

king = t:mW

customPiece1  = d:WcK
customPiece2  = s:mK2cF
customPiece3  = c:gQ
customPiece4  = l:WfF
customPiece5  = x:KAD
customPiece6  = b:mDcK
customPiece7  = a:mR3cK
customPiece8  = u:N
customPiece9  = m:W

customPiece11 = e:W
customPiece12 = y:mKcF
customPiece13 = v:gR
customPiece14 = o:W
customPiece15 = q:K

; ---- Starting position ---------------------------------------------------
; Baseline rank 7:       . . m u b m b u m m . .   (8 Horde pieces)
; This variant rank 7:   . m m u b m b u m m m .   (10 Horde pieces)
; The two extra Minions sit on b7 and k7, covering the flanks where the
; baseline Horde line had open corridors.
;
;   rank 8  . . . . a b t b a . . .
;   rank 7  . m m u b m b u m m m .
;   rank 6  . . . . . . . . . . . .
;   rank 5  . . . # . . . . # . . .
;   rank 4  . . . . # # . . . . . .
;   rank 3  . . . . . . . . . . . .
;   rank 2  . . . . . . . . . . . .
;   rank 1  . . . X C L S D . . . .
;
startFen = 4abtba3/1mmubmbummm1/12/3*4*3/4**6/12/12/3XCLSD4 w - - 0 1

extinctionValue      = loss
extinctionPieceTypes = *
extinctionPieceCount = 0

castling          = false
doubleStep        = false
enPassantRegion   = -
promotionRegionWhite = -
promotionRegionBlack = -
promotionPieceTypes  = -
nMoveRule         = 0
nFoldRule         = 0
